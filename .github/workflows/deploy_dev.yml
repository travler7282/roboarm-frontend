name: Deploy RoboArm Frontend (Dev)

on:
  push:
    branches: [dev]

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci --include=optional

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEV_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy build to S3 under apps/roboarm
        run: aws s3 sync ./dist s3://${{ secrets.AWS_DEV_BUCKET_NAME }}/apps/roboarm/ --delete

      - name: Invalidate CloudFront cache for RoboArm path
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.AWS_DEV_CLOUDFRONT_ID }} \
            --paths "/apps/roboarm/*"
